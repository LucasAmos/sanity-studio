name: CI

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }} - ci
  cancel-in-progress: true

env:
  SCHEMA_VALIDATION_REPORT: schema-report.txt
  DATASET_VALIDATION_REPORT: ./dataset-report.txt
  SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-22.04
    environment:
      name: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Lint commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed

  validate-schema:
    environment:
      name: ci
    name: Validate Studio schema
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./studio
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: lts/*
      - run: yarn install --immutable

      - name: Validate Studio schema
        id: validate
        run: |
          npx sanity schema validate >> ${{ env.SCHEMA_VALIDATION_REPORT }}
          exit_code=$?
          {
            echo "## Schema Validation Results"
            echo "\`\`\`"
            cat ${{ env.SCHEMA_VALIDATION_REPORT }}
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY
          exit $exit_code

      - name: Post schema validation report
        uses: actions/github-script@v6
        if: failure() && steps.validate.outcome == 'failure'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('studio/${{ env.SCHEMA_VALIDATION_REPORT }}', 'utf8');
            const body = [
                '### ❌ Schema validation failed',
                '',
                `\`\`\`${report}\`\`\``,
            ].join('\n');

            await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
            });

  validate-dataset:
    environment:
      name: ci
    name: Validate dataset
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./studio
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24
      - run: yarn install --immutable

      - name: Validate dataset
        id: validate
        run: |
          npx sanity documents validate --yes --level info >> ${{ env.DATASET_VALIDATION_REPORT }}
          exit_code=$?
          {
            echo "## Dataset Validation Results"
            echo "\`\`\`"
            cat ${{ env.DATASET_VALIDATION_REPORT }}
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY
          exit $exit_code
        env:
          ## GOTCHA: a deploy token does not have permission to read documents
          ## and will succeed silenty as it will pull zero documents and validation
          ## will always pass, use a separate VIEWER token
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN_VIEWER }}

      - name: Post dataset validation report
        if: failure() && steps.validate.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs'); 
            const report = fs.readFileSync('studio/${{ env.DATASET_VALIDATION_REPORT }}', 'utf8');
            const body = [
                '### ❌ Dataset validation failed',
                '',
                `\`\`\`${report}\`\`\``,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  app-test-1:
    uses: ./.github/workflows/job-test-app.yml
    secrets: inherit
    with:
      directory: apps/app-feedback
      name: feedback

  app-test-2:
    uses: ./.github/workflows/job-test-app.yml
    secrets: inherit
    with:
      directory: apps/app-test
      name: test

  test-studio:
    environment:
      name: ci
    name: Test studio
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./studio
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24
      - run: yarn install --immutable

      - name: Run tests
        run: yarn test

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-24.04-arm
    environment:
      name: Development
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: setup npm auth token
        run: npm set //npm.pkg.github.com/:_authToken ${{secrets.GITHUB_TOKEN}}

      - name: set npm registry
        run: npm set @lucasamos:registry https://npm.pkg.github.com

      - name: corepack enable
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: yarn install
        run: yarn install --immutable

      - name: git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Release dry run
        run: yarn run release:dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SANITY_STUDIO_DATASET: production
